name: Build Development

on:
  push:
    branches: [master]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Download DecentHolograms
        run: |
          curl -L -o /tmp/DecentHolograms-2.7.2.jar \
            https://github.com/DecentSoftware-eu/DecentHolograms/releases/download/2.7.2/DecentHolograms-2.7.2.jar
          mvn install:install-file \
            -Dfile=/tmp/DecentHolograms-2.7.2.jar \
            -DgroupId=com.github.decentsoftware-eu \
            -DartifactId=decentholograms \
            -Dversion=2.7.2 \
            -Dpackaging=jar

      - name: Build
        run: mvn package --file pom.xml

      - name: Extract repository name
        run: echo "NAME=$(basename ${{ github.repository }})" >> $GITHUB_ENV

      - name: Upload Build
        uses: marvinpinto/action-automatic-releases@master
        with:
          title: "${{ env.NAME }}"
          automatic_release_tag: "latest"
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          files: "plugin/target/*.jar"
          prerelease: false
